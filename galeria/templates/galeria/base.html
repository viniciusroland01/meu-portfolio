<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ perfil.nome }} | Backend Developer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --primary-blue: #4169E1;
            --secondary-blue: #6495ED;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: rgba(13, 17, 23, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #30363d;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -2px;
            color: #ffffff;
        }

        .subtitle {
            font-family: 'Fira Code', monospace;
            color: var(--primary-blue);
            font-size: 1.5rem;
        }

        .typing-effect {
            display: inline-block;
            overflow: hidden;
            border-right: 3px solid var(--primary-blue);
            white-space: nowrap;
            width: 0;
            animation: typing 3.5s steps(40, end) forwards, blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--primary-blue); } }

        .btn-primary-custom {
            background-color: var(--primary-blue);
            color: white;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 8px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary-custom:hover {
            background-color: var(--secondary-blue);
            transform: translateY(-3px);
            color: white;
        }

        .profile-oval {
            width: 320px;
            height: 420px;
            background: linear-gradient(45deg, var(--bg-card), #1f2937);
            border-radius: 50% / 60% 60% 40% 40%;
            border: 2px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0 auto; 
        }

        .skill-card {
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .skill-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-blue);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .skill-icon {
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: block;
        }

        .fa-python { color: #3776ab; }
        .fa-database { color: #336791; }
        .fa-html5 { color: #e34c26; }
        .fa-bootstrap { color: #7952b3; }
        .fa-git-alt { color: #f05032; }
        .fa-code-branch { color: #52b089; } 
        .fa-js { color: #f7df1e; }
        .fa-css3 { color: #1572b6; }

        .skill-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: #ffffff;
        }

        .contact-link {
            color: var(--text-main);
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }

        .contact-link:hover {
            color: var(--primary-blue);
            transform: translateX(5px);
        }

        .contact-icon {
            font-size: 1.5rem;
            width: 30px;
            text-align: center;
        }

        footer p {
            color: #c9d1d9 !important;
            font-family: 'Fira Code', monospace;
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">{{ perfil.nome }}</a>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="py-5 mt-auto border-top border-secondary text-center">
        <div class="container">
            <p class="text-light opacity-75 mb-0" style="font-size: 0.9rem; letter-spacing: 1px;">
                <i class="fas fa-code me-1"></i> 2026 {{ perfil.nome }} | Desenvolvido com Django
            </p>
           
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
